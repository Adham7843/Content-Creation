<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pricing Promo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    width: 100vw; height: 100vh;
    background: var(--bg, #1a1a2e); color: #fff;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 6vw;
}
.badge {
    display: inline-block; padding: 1.5vh 3vw; font-size: 1.5vw;
    background: linear-gradient(135deg, var(--primary, #6C63FF), var(--secondary, #FF6584));
    border-radius: 100px; margin-bottom: 4vh; font-weight: 700;
    animation: pulse 2s ease-in-out infinite;
}
h1 { font-size: 4vw; margin-bottom: 1vh; animation: fadeIn 1.5s both; }
.price { font-size: 8vw; font-weight: 800; margin: 3vh 0;
    background: linear-gradient(135deg, var(--primary, #6C63FF), var(--secondary, #FF6584));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: scaleUp 1.5s 0.5s both;
}
.features { font-size: 1.8vw; opacity: 0.8; margin-bottom: 4vh; animation: fadeIn 1.5s 1s both; }
.cta-button {
    display: inline-block; padding: 3vh 8vw; font-size: 2.5vw;
    font-weight: 800; color: #fff;
    background: linear-gradient(135deg, var(--primary, #6C63FF), var(--secondary, #FF6584));
    border-radius: 100px; text-decoration: none;
    animation: scaleUp 1s 1.5s both;
}
@keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
@keyframes scaleUp { 0% { opacity: 0; transform: scale(0.7); } 100% { opacity: 1; transform: scale(1); } }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
</style>
</head>
<body>
<div class="badge">{{BADGE}}</div>
<h1>{{HEADLINE}}</h1>
<div class="price">{{PRICE}}</div>
<div class="features">{{FEATURES}}</div>
<a class="cta-button" href="{{CTA_URL}}">{{CTA_TEXT}}</a>
</body>
</html>
